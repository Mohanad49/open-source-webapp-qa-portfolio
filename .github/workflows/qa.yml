name: UI Automation Evidence

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BASE_URL: https://the-internet.herokuapp.com
  BROWSER: chrome
  HEADLESS: true
  TIMEOUT: 15

jobs:
  test:
    name: Selenium + PyTest regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java for Allure CLI
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure command line
        run: npm install -g allure-commandline

      - name: Run smoke suite on pull requests
        if: github.event_name == 'pull_request'
        run: |
          python -m pytest -m smoke --browser chrome \
            --html=reports/pytest-report.html --self-contained-html \
            --alluredir=reports/allure-results

      - name: Run full suite on main/manual/schedule
        if: github.event_name != 'pull_request'
        id: regression
        continue-on-error: true
        run: |
          python -m pytest --browser chrome \
            --html=reports/pytest-report.html --self-contained-html \
            --alluredir=reports/allure-results

      - name: Generate Allure static report
        if: always()
        run: |
          mkdir -p public
          cp -R report-hub/* public/
          if [ -d reports/allure-results ]; then
            allure generate reports/allure-results --clean -o public/allure-report
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: |
            reports/
            public/

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy report hub to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && always()
        uses: actions/deploy-pages@v4

      - name: Fail workflow when regression failed
        if: steps.regression.outcome == 'failure'
        run: exit 1
